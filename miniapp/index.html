<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Бензин рядом</title>
<link rel="stylesheet" href="/app/style.css">
</head>
<body>

<div class="container" id="app">
  <!-- Header -->
  <div class="header">
    <h1>⛽ Бензин рядом</h1>
    <div class="subtitle" id="header-subtitle">Выбери город</div>
  </div>

  <!-- City selector -->
  <div class="city-bar">
    <select id="city-select">
      <option value="">Загрузка...</option>
    </select>
    <button class="geo-btn" id="geo-btn" title="Моё местоположение">📍</button>
  </div>

  <!-- Emergency -->
  <button class="emergency-btn" id="emergency-btn">🚨 Экстренный поиск — нужен бензин!</button>

  <!-- Search -->
  <div class="search-box">
    <span class="icon">🔍</span>
    <input type="text" id="search-input" placeholder="Поиск АЗС...">
  </div>

  <!-- Fuel filters -->
  <div class="filters" id="fuel-filters">
    <div class="filter-chip active" data-fuel="">Все</div>
    <div class="filter-chip" data-fuel="92">АИ-92</div>
    <div class="filter-chip" data-fuel="95">АИ-95</div>
    <div class="filter-chip" data-fuel="98">АИ-98</div>
    <div class="filter-chip" data-fuel="diesel">ДТ</div>
  </div>

  <!-- Price filter -->
  <div class="filter-row" id="price-filters">
    <div class="filter-chip active" data-price="">Любая цена</div>
    <div class="filter-chip" data-price="50">до 50₽</div>
    <div class="filter-chip" data-price="60">до 60₽</div>
    <div class="filter-chip" data-price="70">до 70₽</div>
    <div class="filter-chip" data-price="80">до 80₽</div>
  </div>

  <!-- Network filter -->
  <div class="network-chips" id="network-filters">
    <div class="network-chip active" data-net="">Все сети</div>
    <div class="network-chip" data-net="Лукойл">Лукойл</div>
    <div class="network-chip" data-net="Газпром">Газпром</div>
    <div class="network-chip" data-net="Роснефть">Роснефть</div>
    <div class="network-chip" data-net="Татнефть">Татнефть</div>
    <div class="network-chip" data-net="Газоил">Газоил</div>
    <div class="network-chip" data-net="ОПТИ">ОПТИ</div>
    <div class="network-chip" data-net="Shell">Shell</div>
  </div>

  <!-- Stations -->
  <div class="stations-list" id="stations-list">
    <div class="loading">
      <div class="spinner"></div>
      <div>Загрузка...</div>
    </div>
  </div>

  <!-- Disclaimer -->
  <div class="disclaimer" id="disclaimer" style="display:none"></div>
</div>

<!-- Report overlay -->
<div class="report-overlay" id="report-overlay">
  <div class="report-sheet">
    <h3 id="report-title">Сообщить о наличии</h3>
    <div class="field">
      <label>Топливо</label>
      <div class="fuel-options" id="report-fuel-options">
        <div class="fuel-opt selected" data-fuel="92">АИ-92</div>
        <div class="fuel-opt" data-fuel="95">АИ-95</div>
        <div class="fuel-opt" data-fuel="98">АИ-98</div>
        <div class="fuel-opt" data-fuel="diesel">ДТ</div>
      </div>
    </div>
    <div class="field">
      <label>Наличие</label>
      <div class="avail-options" id="report-avail">
        <div class="avail-opt yes selected" data-avail="true">✅ Есть</div>
        <div class="avail-opt no" data-avail="false">❌ Нет</div>
      </div>
    </div>
    <div class="field">
      <label>Цена (₽/л, необязательно)</label>
      <input type="number" id="report-price" placeholder="например 56.50" step="0.10" min="0" max="500">
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="report-cancel">Отмена</button>
      <button class="btn btn-primary" id="report-submit">Отправить</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="/app/app.js"></script>
</body>
</html>
