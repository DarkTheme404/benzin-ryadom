<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1080px; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }

.slide {
  width: 1080px; height: 1080px;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: white; text-align: center; padding: 60px;
}
.title { font-size: 56px; font-weight: 900; margin-bottom: 50px; }
.phones { display: flex; gap: 60px; margin-bottom: 50px; }
.phone {
  width: 380px; height: 600px; border-radius: 40px; padding: 20px;
  display: flex; flex-direction: column; overflow: hidden;
}
.phone-tg {
  background: linear-gradient(180deg, #2AABEE, #229ED9);
  border: 4px solid #2AABEE;
}
.phone-vk {
  background: linear-gradient(180deg, #4C75A3, #3B5998);
  border: 4px solid #4C75A3;
}
.phone-header {
  font-size: 24px; font-weight: 700; padding: 15px; text-align: center;
  background: rgba(0,0,0,0.2); border-radius: 15px; margin-bottom: 15px;
}
.phone-content {
  flex: 1; background: rgba(255,255,255,0.95); border-radius: 15px;
  padding: 20px; color: #333; text-align: left;
}
.station {
  display: flex; align-items: center; gap: 10px; padding: 12px;
  border-bottom: 1px solid #eee; font-size: 16px;
}
.station-icon { font-size: 24px; }
.station-name { font-weight: 600; }
.station-price { color: #16a085; font-weight: 700; margin-left: auto; }
.badge {
  display: inline-block; padding: 8px 20px; border-radius: 20px;
  font-size: 20px; font-weight: 700; margin: 10px 5px;
}
.badge-tg { background: #2AABEE; }
.badge-vk { background: #4C75A3; }
.subtitle { font-size: 32px; color: #a0a0c0; margin-top: 30px; }
</style>
</head>
<body>
<div class="slide">
  <div class="title">ОДНИ ДАННЫЕ. ДВА БОТА.</div>
  <div class="phones">
    <div class="phone phone-tg">
      <div class="phone-header">🔴 Telegram</div>
      <div class="phone-content">
        <div class="station"><span class="station-icon">✅</span><span class="station-name">Лукойл АИ-95</span><span class="station-price">63.2₽</span></div>
        <div class="station"><span class="station-icon">✅</span><span class="station-name">Газпром АИ-92</span><span class="station-price">58.4₽</span></div>
        <div class="station"><span class="station-icon">⚠️</span><span class="station-name">Роснефть ДТ</span><span class="station-price">68.1₽</span></div>
        <div class="station"><span class="station-icon">❌</span><span class="station-name">Татнефть АИ-98</span><span class="station-price">—</span></div>
      </div>
    </div>
    <div class="phone phone-vk">
      <div class="phone-header">🔵 VK</div>
      <div class="phone-content">
        <div class="station"><span class="station-icon">✅</span><span class="station-name">Лукойл АИ-95</span><span class="station-price">63.2₽</span></div>
        <div class="station"><span class="station-icon">✅</span><span class="station-name">Газпром АИ-92</span><span class="station-price">58.4₽</span></div>
        <div class="station"><span class="station-icon">⚠️</span><span class="station-name">Роснефть ДТ</span><span class="station-price">68.1₽</span></div>
        <div class="station"><span class="station-icon">❌</span><span class="station-name">Татнефть АИ-98</span><span class="station-price">—</span></div>
      </div>
    </div>
  </div>
  <div>
    <span class="badge badge-tg">@benzyn_ryadom</span>
    <span class="badge badge-vk">vk.com/benzyn_ryadom</span>
  </div>
  <div class="subtitle">Выбирай удобнее</div>
</div>
</body>
</html>
