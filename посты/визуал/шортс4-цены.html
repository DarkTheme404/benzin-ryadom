<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1920px; overflow: hidden;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #0a0a1a; color: white;
}
.slide {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  opacity: 0; transition: all 0.5s ease;
}
.slide.active { opacity: 1; }

.s1 { background: linear-gradient(180deg, #1a0a0a, #3e1a1a); }
.s1 .icon { font-size: 120px; animation: shake 0.3s infinite; }
.s1 .title { font-size: 64px; font-weight: 900; text-align: center; margin-top: 30px; line-height: 1.2; }
.s1 .sub { font-size: 30px; color: #e74c3c; margin-top: 15px; }

@keyframes shake {
  0%, 100% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
}

.s2 { background: linear-gradient(180deg, #0f0c29, #1a1a3e); }
.s2 .title { font-size: 48px; font-weight: 900; margin-bottom: 40px; }
.s2 .prices {
  display: flex; flex-direction: column; gap: 20px; width: 800px;
}
.s2 .price-row {
  display: flex; align-items: center; gap: 20px;
  background: rgba(255,255,255,0.05); border-radius: 18px; padding: 22px 28px;
  border: 1px solid rgba(255,255,255,0.1);
  opacity: 0; animation: slideIn 0.4s forwards;
}
.s2 .price-row:nth-child(1) { animation-delay: 0.2s; }
.s2 .price-row:nth-child(2) { animation-delay: 0.5s; }
.s2 .price-row:nth-child(3) { animation-delay: 0.8s; }
.s2 .station { font-size: 26px; flex: 1; }
.s2 .old-price { font-size: 28px; color: #888; text-decoration: line-through; }
.s2 .new-price { font-size: 32px; font-weight: 900; color: #16a085; }
.s2 .diff { font-size: 24px; color: #e74c3c; font-weight: 700; }

@keyframes slideIn { to { opacity: 1; transform: translateX(0); } }
.s2 .price-row { transform: translateX(-20px); }

.s3 { background: linear-gradient(180deg, #0a1a0a, #16a085); }
.s3 .calc {
  background: rgba(0,0,0,0.3); border-radius: 30px; padding: 40px 50px;
  text-align: center; border: 2px solid rgba(255,255,255,0.2);
}
.s3 .calc-title { font-size: 36px; font-weight: 700; margin-bottom: 30px; }
.s3 .calc-row {
  display: flex; align-items: center; justify-content: center; gap: 15px;
  font-size: 40px; margin-bottom: 15px;
}
.s3 .calc-op { color: #16a085; font-weight: 900; }
.s3 .calc-result {
  font-size: 72px; font-weight: 900; color: #f1c40f; margin-top: 20px;
  animation: pop 0.6s ease;
}

@keyframes pop { 0% { transform: scale(0); } 70% { transform: scale(1.2); } 100% { transform: scale(1); } }

.s4 { background: linear-gradient(180deg, #1a1a2e, #16a085); }
.s4 .title { font-size: 56px; font-weight: 900; text-align: center; margin-bottom: 40px; }
.s4 .links {
  display: flex; flex-direction: column; gap: 25px;
}
.s4 .link {
  display: flex; align-items: center; gap: 20px;
  background: rgba(255,255,255,0.1); border-radius: 20px; padding: 25px 35px;
  border: 1px solid rgba(255,255,255,0.2); font-size: 28px; font-weight: 600;
  opacity: 0; animation: fadeUp 0.5s forwards;
}
.s4 .link:nth-child(1) { animation-delay: 0.3s; }
.s4 .link:nth-child(2) { animation-delay: 0.6s; }

@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
.s4 .link { transform: translateY(15px); }

.progress {
  position: absolute; bottom: 0; left: 0; height: 6px; background: #16a085;
  width: 0; transition: width linear;
}
</style>
</head>
<body>

<div class="slide s1 active" id="s1">
  <div class="icon">💰</div>
  <div class="title">ЦЕНЫ РАЗНЯТСЯ<br>ДО 5 РУБЛЕЙ</div>
  <div class="sub">Даже в одном городе</div>
</div>

<div class="slide s2" id="s2">
  <div class="title">В ОДНОМ ГОРОДЕ</div>
  <div class="prices">
    <div class="price-row">
      <span class="station">Лукойл АИ-92</span>
      <span class="old-price">63.2₽</span>
      <span class="new-price">58.4₽</span>
      <span class="diff">-4.8₽</span>
    </div>
    <div class="price-row">
      <span class="station">Газпром АИ-92</span>
      <span class="old-price">62.0₽</span>
      <span class="new-price">57.9₽</span>
      <span class="diff">-4.1₽</span>
    </div>
    <div class="price-row">
      <span class="station">Роснефть АИ-92</span>
      <span class="old-price">61.5₽</span>
      <span class="new-price">57.2₽</span>
      <span class="diff">-4.3₽</span>
    </div>
  </div>
</div>

<div class="slide s3" id="s3">
  <div class="calc">
    <div class="calc-title">НА ПОЛНОМ БАКЕ</div>
    <div class="calc-row">50 литров <span class="calc-op">×</span> 5₽</div>
    <div class="calc-result">= 250₽</div>
    <div style="font-size:28px;margin-top:20px;color:#aaa">экономии</div>
  </div>
</div>

<div class="slide s4" id="s4">
  <div class="title">ПРОВЕРЯЙ ЦЕНЫ</div>
  <div class="links">
    <div class="link">📱 @benzyn_ryadom</div>
    <div class="link">📱 vk.com/benzyn_ryadom</div>
  </div>
</div>

<div class="progress" id="progress"></div>

<script>
const slides = ['s1','s2','s3','s4'];
const durations = [2500, 4000, 3500, 3000];
let current = 0;
const progress = document.getElementById('progress');

function showSlide(idx) {
  document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
  document.getElementById(slides[idx]).classList.add('active');
  progress.style.width = '0';
  void progress.offsetWidth;
  progress.style.transition = `width ${durations[idx]}ms linear`;
  progress.style.width = '100%';
}

function next() {
  current++;
  if (current < slides.length) {
    showSlide(current);
    setTimeout(next, durations[current]);
  }
}

showSlide(0);
setTimeout(next, durations[0]);
</script>
</body>
</html>
