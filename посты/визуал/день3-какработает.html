<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1080px; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }

.slide {
  width: 1080px; height: 1080px;
  background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: white; text-align: center; padding: 60px;
}
.title { font-size: 56px; font-weight: 900; margin-bottom: 50px; }
.flow { display: flex; align-items: center; gap: 20px; margin-bottom: 50px; }
.step {
  background: rgba(255,255,255,0.08); border-radius: 20px; padding: 30px 25px;
  width: 180px; text-align: center; border: 1px solid rgba(255,255,255,0.1);
}
.step-num { font-size: 36px; font-weight: 900; color: #16a085; margin-bottom: 10px; }
.step-icon { font-size: 48px; margin-bottom: 10px; }
.step-text { font-size: 18px; color: #a0a0c0; }
.arrow { font-size: 36px; color: #16a085; }
.sources {
  display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px;
  width: 800px;
}
.source {
  background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px;
  text-align: left; display: flex; align-items: center; gap: 15px;
  border: 1px solid rgba(255,255,255,0.08);
}
.source-icon { font-size: 36px; }
.source-name { font-size: 20px; font-weight: 700; }
.source-desc { font-size: 16px; color: #888; }
.cta {
  background: #16a085; color: white; padding: 18px 45px; border-radius: 50px;
  font-size: 26px; font-weight: 700;
}
</style>
</head>
<body>
<div class="slide">
  <div class="title">КАК ЭТО РАБОТАЕТ?</div>
  <div class="flow">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-icon">📱</div>
      <div class="step-text">Открой бота</div>
    </div>
    <div class="arrow">→</div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-icon">📍</div>
      <div class="step-text">Отправь геолокацию</div>
    </div>
    <div class="arrow">→</div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-icon">⛽</div>
      <div class="step-text">Получи список АЗС</div>
    </div>
  </div>
  <div class="sources">
    <div class="source">
      <div class="source-icon">📊</div>
      <div>
        <div class="source-name">fuelprice.ru</div>
        <div class="source-desc">Цены 2400+ АЗС</div>
      </div>
    </div>
    <div class="source">
      <div class="source-icon">🗺️</div>
      <div>
        <div class="source-name">2ГИС</div>
        <div class="source-desc">Наличие и цены</div>
      </div>
    </div>
    <div class="source">
      <div class="source-icon">💬</div>
      <div>
        <div class="source-name">TG-каналы</div>
        <div class="source-desc">Отчёты водителей</div>
      </div>
    </div>
    <div class="source">
      <div class="source-icon">👥</div>
      <div>
        <div class="source-name">Пользователи</div>
        <div class="source-desc">Данные в реальном времени</div>
      </div>
    </div>
  </div>
  <div class="cta">Каждый час обновление</div>
</div>
</body>
</html>
