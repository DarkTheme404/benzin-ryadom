<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1080px; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }

.slide1 {
  width: 1080px; height: 1080px;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: white; text-align: center;
}
.fuel-icon { font-size: 120px; margin-bottom: 30px; }
.title { font-size: 72px; font-weight: 900; letter-spacing: 4px; margin-bottom: 20px; }
.subtitle { font-size: 36px; font-weight: 300; color: #a8a8d8; margin-bottom: 60px; }
.features {
  display: flex; gap: 40px; margin-bottom: 60px;
}
.feature {
  background: rgba(255,255,255,0.08); border-radius: 20px; padding: 30px 25px;
  width: 200px; text-align: center; border: 1px solid rgba(255,255,255,0.1);
}
.feature-icon { font-size: 48px; margin-bottom: 10px; }
.feature-text { font-size: 20px; color: #c0c0e0; }
.cta {
  background: #16a085; color: white; padding: 20px 50px; border-radius: 50px;
  font-size: 28px; font-weight: 700; letter-spacing: 1px;
}
.logos { margin-top: 40px; font-size: 24px; color: #888; }
</style>
</head>
<body>
<div class="slide1">
  <div class="fuel-icon">⛽</div>
  <div class="title">БЕНЗИН РЯДОМ</div>
  <div class="subtitle">Знаешь где есть топливо — не стоишь в очереди</div>
  <div class="features">
    <div class="feature">
      <div class="feature-icon">✅</div>
      <div class="feature-text">Наличие</div>
    </div>
    <div class="feature">
      <div class="feature-icon">💰</div>
      <div class="feature-text">Цены</div>
    </div>
    <div class="feature">
      <div class="feature-icon">📊</div>
      <div class="feature-text">Источники</div>
    </div>
    <div class="feature">
      <div class="feature-icon">🕐</div>
      <div class="feature-text">Каждый час</div>
    </div>
  </div>
  <div class="cta">ПОПРОБУЙ БЕСПЛАТНО</div>
  <div class="logos">TG: @benzyn_ryadom &nbsp;|&nbsp; VK: vk.com/benzyn_ryadom</div>
</div>
</body>
</html>
