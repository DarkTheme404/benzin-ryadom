<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1080px; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }

.slide {
  width: 1080px; height: 1080px;
  background: linear-gradient(135deg, #c0392b, #e74c3c, #d35400);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: white; text-align: center; padding: 60px;
}
.emoji-big { font-size: 100px; margin-bottom: 30px; }
.title { font-size: 64px; font-weight: 900; margin-bottom: 40px; line-height: 1.2; }
.stats { display: flex; gap: 50px; margin-bottom: 50px; }
.stat { text-align: center; }
.stat-number { font-size: 72px; font-weight: 900; }
.stat-label { font-size: 22px; color: rgba(255,255,255,0.8); margin-top: 5px; }
.solution {
  background: rgba(0,0,0,0.3); border-radius: 20px; padding: 30px 50px;
  margin-bottom: 40px; border: 2px solid rgba(255,255,255,0.2);
}
.solution-text { font-size: 28px; line-height: 1.6; }
.bots {
  display: flex; gap: 30px; margin-top: 20px;
}
.bot {
  background: rgba(255,255,255,0.15); border-radius: 15px; padding: 20px 30px;
  font-size: 24px; border: 1px solid rgba(255,255,255,0.3);
}
</style>
</head>
<body>
<div class="slide">
  <div class="emoji-big">😤</div>
  <div class="title">ОЧЕРЕДИ НА АЗС —<br>ЭТО НОРМА?</div>
  <div class="stats">
    <div class="stat">
      <div class="stat-number">40</div>
      <div class="stat-label">минут в очереди</div>
    </div>
    <div class="stat">
      <div class="stat-number">20л</div>
      <div class="stat-label">лимит на бак</div>
    </div>
    <div class="stat">
      <div class="stat-number">Завтра</div>
      <div class="stat-label">ответ на «когда будет?»</div>
    </div>
  </div>
  <div class="solution">
    <div class="solution-text">Проверяй в боте ПЕРЕД выездом<br>и экономь 40 минут каждый раз</div>
  </div>
  <div class="bots">
    <div class="bot">🔴 @benzyn_ryadom</div>
    <div class="bot">🔵 vk.com/benzyn_ryadom</div>
  </div>
</div>
</body>
</html>
