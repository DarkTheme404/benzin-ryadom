<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 600px;
    height: 600px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 50px;
    text-align: center;
  }

  .logo {
    font-size: 100px;
    margin-bottom: 20px;
  }

  h1 {
    font-size: 52px;
    font-weight: 800;
    margin-bottom: 16px;
    line-height: 1.1;
  }

  h1 span {
    color: #4ade80;
  }

  .subtitle {
    font-size: 20px;
    color: #94a3b8;
    margin-bottom: 40px;
    line-height: 1.5;
  }

  .stats {
    display: flex;
    gap: 50px;
    margin-bottom: 40px;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-size: 48px;
    font-weight: 800;
    color: #4ade80;
  }

  .stat-label {
    font-size: 14px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .features {
    display: flex;
    gap: 20px;
    margin-bottom: 40px;
  }

  .feature {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 20px;
    width: 160px;
  }

  .feature-icon {
    font-size: 32px;
    margin-bottom: 8px;
  }

  .feature-text {
    font-size: 14px;
    color: #cbd5e1;
  }

  .cta {
    background: #4ade80;
    color: #000;
    font-size: 18px;
    font-weight: 700;
    padding: 16px 40px;
    border-radius: 16px;
  }
</style>
</head>
<body>
  <div class="logo">⛽</div>
  <h1>Бензин <span>рядом</span></h1>
  <p class="subtitle">Найди бензин за 5 секунд<br>Бесплатно. Без рекламы.</p>
  <div class="stats">
    <div class="stat">
      <div class="stat-num">27K+</div>
      <div class="stat-label">АЗС</div>
    </div>
    <div class="stat">
      <div class="stat-num">40K+</div>
      <div class="stat-label">Отчётов</div>
    </div>
  </div>
  <div class="features">
    <div class="feature">
      <div class="feature-icon">🟢</div>
      <div class="feature-text">Цены и<br>наличие</div>
    </div>
    <div class="feature">
      <div class="feature-icon">📍</div>
      <div class="feature-text">Поиск по<br>городу</div>
    </div>
    <div class="feature">
      <div class="feature-icon">🔔</div>
      <div class="feature-text">Push о<br>завозе</div>
    </div>
  </div>
  <div class="cta">@benzyn_ryadom</div>
</body>
</html>
