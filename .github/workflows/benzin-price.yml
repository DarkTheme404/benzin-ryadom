name: benzin-price.ru Parser (Playwright → API)

# Парсит benzin-price.ru (28k АЗС) через Playwright.
# Загружает результат в backend через POST /api/import_prices.
# Требует secrets: IMPORT_API_KEY, BACKEND_URL.
# Запускается вручную или по расписанию (раз в сутки).

on:
  schedule:
    # Каждый день в 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      region:
        description: "ID региона (1=Москва, 2=СПб) или 'all'"
        required: false
        default: "all"
      limit:
        description: "Лимит АЗС (default 200)"
        required: false
        default: "200"
      skip_upload:
        description: "Только собрать JSON (не загружать в API)"
        type: boolean
        required: false
        default: "false"

jobs:
  parse:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      BACKEND_URL: ${{ secrets.BACKEND_URL }}
      IMPORT_API_KEY: ${{ secrets.IMPORT_API_KEY }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          pip install aiohttp aiosqlite beautifulsoup4 python-dotenv certifi playwright
      - name: Install Playwright
        run: |
          playwright install chromium
          playwright install-deps chromium
      - name: Run benzin-price parser
        id: parse
        env:
          REGION: ${{ github.event.inputs.region || 'all' }}
          LIMIT: ${{ github.event.inputs.limit || '200' }}
        run: |
          python scripts/parse_benzin_price_headless.py \
            --region "${REGION}" \
            --limit "${LIMIT}" \
            --output benzin_prices_${REGION}.json
      - name: Upload to backend API
        id: upload
        if: env.BACKEND_URL != '' && env.IMPORT_API_KEY != '' && github.event.inputs.skip_upload != 'true'
        run: |
          REGION="${{ github.event.inputs.region || 'all' }}"
          if [ -f "benzin_prices_${REGION}.json" ]; then
            curl -fsSL -X POST "${BACKEND_URL}/api/import_prices" \
              -H "Content-Type: application/json" \
              -H "X-Import-Key: ${IMPORT_API_KEY}" \
              --data-binary "@benzin_prices_${REGION}.json" \
              -o upload_result.json -w "%{http_code}" > http_code.txt
            cat http_code.txt
            cat upload_result.json || true
            CODE=$(cat http_code.txt)
            if [ "$CODE" != "200" ]; then
              echo "❌ Upload failed with HTTP $CODE"
              exit 1
            fi
          else
            echo "❌ JSON file not found"
            exit 1
          fi
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benzin-prices-${{ github.event.inputs.region || 'all' }}
          path: |
            benzin_prices_*.json
            upload_result.json
          retention-days: 7
      - name: Summary
        if: always()
        run: |
          echo "## benzin-price.ru parser" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Регион: \`${{ github.event.inputs.region || 'all' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Лимит: \`${{ github.event.inputs.limit || '200' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Upload: \`${{ env.BACKEND_URL != '' && env.IMPORT_API_KEY != '' }}\`" >> $GITHUB_STEP_SUMMARY
          if [ -f upload_result.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Результат загрузки" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat upload_result.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
