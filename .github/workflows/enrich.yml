name: Enrich Addresses (Nominatim)

# Каждые 6 часов обогащает 500 АЗС адресами через Nominatim.
# Бесплатно (GitHub Actions Free: 2000 мин/мес).
# Использует secrets: DATABASE_URL.

on:
  schedule:
    # Каждые 6 часов: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Лимит АЗС (по умолчанию 500)"
        required: false
        default: "500"

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          pip install aiohttp aiosqlite asyncpg python-dotenv certifi
      - name: Run enrich
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          USE_SQLITE: "false"
        run: |
          python scripts/enrich_addresses.py --limit ${{ github.event.inputs.limit || '500' }} --rate 1.0
