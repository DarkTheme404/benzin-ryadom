<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#f7931e"/>
    </linearGradient>
  </defs>

  <!-- Dark background with rounded corners -->
  <rect x="0" y="0" width="512" height="512" rx="64" ry="64" fill="#0a0e1a"/>

  <!-- Gas pump body -->
  <rect x="170" y="150" width="120" height="220" rx="14" ry="14" fill="url(#accent)"/>

  <!-- Pump top / display area -->
  <rect x="182" y="168" width="96" height="60" rx="8" ry="8" fill="#0a0e1a" opacity="0.3"/>

  <!-- Nozzle hose curve -->
  <path d="M290 200 Q350 200 350 260 L350 310" stroke="url(#accent)" stroke-width="16" stroke-linecap="round" fill="none"/>

  <!-- Nozzle head -->
  <rect x="338" y="300" width="36" height="50" rx="6" ry="6" fill="url(#accent)"/>
  <rect x="346" y="345" width="20" height="14" rx="3" ry="3" fill="#0a0e1a"/>

  <!-- Pump handle -->
  <rect x="150" y="260" width="40" height="10" rx="5" ry="5" fill="url(#accent)"/>

  <!-- Base / ground line -->
  <rect x="150" y="364" width="200" height="16" rx="8" ry="8" fill="url(#accent)"/>

  <!-- Small fuel drop accent -->
  <circle cx="256" cy="420" r="18" fill="url(#accent)" opacity="0.8"/>
  <path d="M256 408 Q248 422 256 438 Q264 422 256 408Z" fill="#0a0e1a" opacity="0.25"/>
</svg>
